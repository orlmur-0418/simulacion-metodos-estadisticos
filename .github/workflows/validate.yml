name: Validate academic site

on:
  pull_request:
  push:
    branches:
      - main
      - codex/actualizacion-definitiva-taller

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check sim-worker.js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Check files, links and terminology
        run: python scripts/validate_sources.py

      - name: Install figure dependencies
        run: python -m pip install -r requirements.txt

      - name: Regenerate figures outside the repository
        run: |
          figure_dir="$RUNNER_TEMP/generated-figures"
          python scripts/generate_figures.py --output-dir "$figure_dir"
          test -f "$figure_dir/problema1_intervalos.png"
          test -f "$figure_dir/problema2_cobertura.png"
          test -f "$figure_dir/problema3_varianza.png"
          test -f "$figure_dir/problema3_cobertura_intervalos.png"
          test -f "$figure_dir/problema4_estimadores.png"
          test -f "$figure_dir/problema5_bootstrap.png"

      - name: Install Tectonic 0.16.9
        run: |
          archive="$RUNNER_TEMP/tectonic.tar.gz"
          install_dir="$RUNNER_TEMP/tectonic-bin"
          curl --fail --location --retry 3 \
            "https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.16.9/tectonic-0.16.9-x86_64-unknown-linux-gnu.tar.gz" \
            --output "$archive"
          echo "f3c825128095dc3399ea11c08c18035b33050a216930c295c79e8eb11bd21de4  $archive" | sha256sum --check --status
          mkdir -p "$install_dir"
          tar -xzf "$archive" -C "$install_dir"
          tectonic_bin="$(find "$install_dir" -type f -name tectonic -print -quit)"
          test -n "$tectonic_bin"
          chmod +x "$tectonic_bin"
          echo "TECTONIC_BIN=$tectonic_bin" >> "$GITHUB_ENV"

      - name: Compile the TEX twice without replacing the approved PDF
        run: |
          build_dir="$RUNNER_TEMP/tectonic-build"
          mkdir -p "$build_dir"
          "$TECTONIC_BIN" actividad_evaluativa_III_Orlain_Murillo.tex --outdir "$build_dir" --keep-logs
          "$TECTONIC_BIN" actividad_evaluativa_III_Orlain_Murillo.tex --outdir "$build_dir" --keep-logs
          test -s "$build_dir/actividad_evaluativa_III_Orlain_Murillo.pdf"
          test -s "$build_dir/actividad_evaluativa_III_Orlain_Murillo.log"
